<!DOCTYPE html>
<html>
<head>
    <title>Login | KordBio</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'VT323', monospace; background: #000; color: #fff; }
        .pixel-border { border: 4px solid #fff; box-shadow: 8px 8px 0px #222; }
        .input-pixel { background: #000; border: 2px solid #444; padding: 8px; outline: none; }
        .input-pixel:focus { border-color: #3b82f6; color: #3b82f6; }
        .btn-pixel { background: #fff; color: #000; padding: 8px; font-weight: bold; transition: 0.1s; }
        .btn-pixel:active { transform: translate(2px, 2px); box-shadow: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="w-80 p-8 pixel-border bg-zinc-900">
        <h1 class="text-4xl font-bold uppercase mb-6 text-blue-500 italic">User_Login</h1>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for cat, msg in messages %}
              <p class="text-red-500 mb-4 uppercase text-lg">! {{ msg }}</p>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/login" method="POST" class="flex flex-col gap-4">
            <input type="text" name="username" placeholder="USERNAME" class="input-pixel text-xl" required autocomplete="off">
            <input type="password" name="password" placeholder="PASSWORD" class="input-pixel text-xl" required>
            <button type="submit" class="btn-pixel text-2xl uppercase mt-2">[ EXECUTE ]</button>
        </form>

        <div class="mt-6 text-xl text-zinc-500">
            No account? <a href="/register" class="text-white underline">Register.exe</a>
        </div>
    </div>
</body>
</html>
