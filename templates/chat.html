<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat: {{ target.username }}</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'VT323', monospace; background: #000; color: #22c55e; }
        /* Scrollbar styling agar tetap estetik terminal */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: #000; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #22c55e; }
    </style>
</head>
<body class="p-2 sm:p-8 flex justify-center min-h-screen items-center">
    <div class="w-full max-w-xl border-4 border-zinc-800 p-4 sm:p-6 bg-zinc-950 flex flex-col h-[90vh] sm:h-auto">
        
        <div class="flex justify-between border-b border-zinc-800 pb-4 mb-4 items-center">
            <h1 class="text-lg sm:text-2xl truncate mr-2">COMM_LINK: {{ target.username }}</h1>
            <a href="/{{ target.username }}" class="text-red-500 hover:text-white transition-colors text-sm sm:text-base">[EXIT]</a>
        </div>

        <div id="chat-box" class="flex-grow overflow-y-auto mb-4 space-y-3 p-2 bg-black border border-zinc-900 custom-scroll">
            {% for m in msgs %}
            <div class="{{ 'text-right' if m.sender_id == user.id else 'text-left' }}">
                <div class="inline-block max-w-[85%]">
                    <span class="inline-block px-3 py-1 bg-zinc-900 border border-zinc-800 break-words text-sm sm:text-base">
                        {{ m.message }}
                    </span>
                    <div class="text-[10px] text-zinc-600 mt-1 uppercase">
                        {{ m.timestamp.strftime('%H:%M') }}
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>

        <form action="{{ url_for('chat', username=target.username) }}" method="post" class="flex gap-2">
            <input type="text" 
                   name="message" 
                   class="flex-grow bg-black border-2 border-zinc-700 p-2 text-green-400 focus:border-green-500 outline-none text-sm sm:text-base" 
                   placeholder="Type data..." 
                   required 
                   autocomplete="off"
                   autofocus>
            <button type="submit" class="bg-green-600 hover:bg-green-400 text-black px-3 sm:px-6 font-bold transition-colors">
                SEND
            </button>
        </form>
    </div>

    <script>
        // Auto-scroll ke pesan paling bawah saat halaman dimuat
        const chatBox = document.getElementById('chat-box');
        chatBox.scrollTop = chatBox.scrollHeight;
    </script>
</body>
</html>
